name: Build slides (reusable workflow)

on:
  workflow_call:
    inputs:
      include_pdf:
        required: true
        type: boolean
      slides_artifact:
        required: true
        type: string

jobs:
  build:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/csc-training/slidefactory:3.4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build slides
        env:
          INCLUDE_PDF: ${{ inputs.include_pdf }}
        shell: bash
        run: |
          git config --global --add safe.directory $PWD
          GIT_SHORT_SHA=$(git rev-parse --short $GITHUB_SHA)
          GIT_DATE=$(git show -s --format=%ci $GITHUB_SHA)

          # Update theme
          # TODO: PR to slidefactory
          wget https://github.com/csc-training/slidefactory/archive/refs/heads/update-theme.zip
          unzip update-theme.zip

          ARGS=""
          [[ "$INCLUDE_PDF" == "true" ]] && ARGS="--with-pdf"

          slidefactory pages about.yml build \
              --filters tools/mpi_links.py \
              --theme slidefactory-update-theme/theme/csc-plain \
              --pandoc-args='--strip-comments' \
              --info_content "Updated for [$GIT_SHORT_SHA]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA) ($GIT_DATE)" \
              $ARGS

          # Allow choosing open accordion with ?open=..
          # TODO: PR to slidefactory
          bash tools/patch-index-open.sh build/index.html

          # Fetch external slides
          rm -rf build/*/algorithms/
          mkdir -p build/pdf/algorithms/
          wget https://a3s.fi/summerschool/assets/slides/parallel-algorithms.pdf -O build/pdf/algorithms/parallel-algorithms.pdf
          sed -i 's|"html/algorithms/01-link.html"|"pdf/algorithms/parallel-algorithms.pdf"|g' build/index.html
          sed -i 's|"pdf/algorithms/01-link.html"|"pdf/algorithms/parallel-algorithms.pdf"|g' build/index.html

          # Rezip with external slides
          if [[ "$INCLUDE_PDF" == "true" ]]; then
              cd build/pdf
              rm ../slides.zip
              # Zip with sorted file order
              find . -mindepth 1 -type f -o -type d | sort | zip ../slides.zip -@
              cd ../../
          fi

      - name: Upload slide artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.slides_artifact }}
          path: ./build
